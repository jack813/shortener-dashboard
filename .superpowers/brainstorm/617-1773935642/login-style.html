<h2>登录页视觉风格</h2>
<p class="subtitle">选择你偏好的登录页设计方向</p>

<div class="cards">
  <div class="card" data-choice="minimal" onclick="toggleSelect(this)">
    <div class="card-image" style="background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); height: 160px; display: flex; align-items: center; justify-content: center;">
      <div style="background: white; border-radius: 8px; padding: 24px 40px; box-shadow: 0 4px 20px rgba(0,0,0,0.15);">
        <div style="font-weight: 600; margin-bottom: 12px; color: #333;">登录</div>
        <div style="background: #f0f0f0; height: 8px; width: 120px; border-radius: 4px; margin-bottom: 8px;"></div>
        <div style="background: #f0f0f0; height: 8px; width: 120px; border-radius: 4px; margin-bottom: 12px;"></div>
        <div style="background: #667eea; height: 8px; width: 80px; border-radius: 4px;"></div>
      </div>
    </div>
    <div class="card-body">
      <h3>A. 极简居中</h3>
      <p>经典居中卡片式登录，简洁大气，适合专业工具</p>
    </div>
  </div>

  <div class="card" data-choice="split" onclick="toggleSelect(this)">
    <div class="card-image" style="display: flex; height: 160px; border-radius: 8px; overflow: hidden;">
      <div style="flex: 1; background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%); display: flex; align-items: center; justify-content: center;">
        <div style="color: white; font-weight: 600; font-size: 14px;">Dashboard</div>
      </div>
      <div style="flex: 1; background: #fafafa; display: flex; align-items: center; justify-content: center; flex-direction: column;">
        <div style="font-weight: 600; margin-bottom: 8px; color: #333; font-size: 12px;">登录</div>
        <div style="background: #e5e5e5; height: 6px; width: 60px; border-radius: 3px; margin-bottom: 6px;"></div>
        <div style="background: #e5e5e5; height: 6px; width: 60px; border-radius: 3px; margin-bottom: 8px;"></div>
        <div style="background: #1a1a2e; height: 6px; width: 40px; border-radius: 3px;"></div>
      </div>
    </div>
    <div class="card-body">
      <h3>B. 左右分栏</h3>
      <p>左侧品牌展示，右侧登录表单，现代感强</p>
    </div>
  </div>

  <div class="card" data-choice="full" onclick="toggleSelect(this)">
    <div class="card-image" style="background: url('data:image/svg+xml,<svg xmlns=\"http://www.w3.org/2000/svg\" viewBox=\"0 0 100 100\"><rect fill=\"%23111827\" width=\"100\" height=\"100\"/><circle fill=\"%23374151\" cx=\"20\" cy=\"80\" r=\"30\"/><circle fill=\"%234B5563\" cx=\"80\" cy=\"30\" r=\"25\"/></svg>'); background-size: cover; height: 160px; display: flex; align-items: center; justify-content: center; border-radius: 8px;">
      <div style="background: rgba(255,255,255,0.95); backdrop-filter: blur(10px); border-radius: 8px; padding: 20px 32px; box-shadow: 0 8px 32px rgba(0,0,0,0.2);">
        <div style="font-weight: 600; margin-bottom: 10px; color: #333; font-size: 12px;">登录</div>
        <div style="background: #e5e5e5; height: 6px; width: 80px; border-radius: 3px; margin-bottom: 6px;"></div>
        <div style="background: #e5e5e5; height: 6px; width: 80px; border-radius: 3px; margin-bottom: 10px;"></div>
        <div style="background: #111827; height: 6px; width: 50px; border-radius: 3px;"></div>
      </div>
    </div>
    <div class="card-body">
      <h3>C. 全屏背景</h3>
      <p>沉浸式背景 + 毛玻璃登录卡片，视觉冲击力强</p>
    </div>
  </div>
</div>

<p style="margin-top: 24px; color: #666; font-size: 14px;">点击选择你喜欢的风格，然后在终端告诉我你的想法。</p>
